plugins {
    id 'multiloader-loader'
    id 'fabric-loom'
    id 'me.modmuss50.mod-publish-plugin' version '1.1.0'
}

repositories {
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
    }
    maven {
        name = "mainReleases"
        url = uri("https://maven.ryanhcode.dev/releases")
    }
    maven {
        name = "Terraformers"
        url = "https://maven.terraformersmc.com/"
    }
    maven { url "https://maven.shedaniel.me/" }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.layered {
        officialMojangMappings()
        parchment("org.parchmentmc.data:parchment-${parchment_minecraft}:${parchment_version}@zip")
    }
    modImplementation "net.fabricmc:fabric-loader:${fabric_loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"

    modImplementation "maven.modrinth:sable:1.2.2+mc1.21.1"
    include(modApi("dev.ryanhcode.sable-companion:sable-companion-fabric-1.21.1:1.4.1"))

    modImplementation("com.terraformersmc:modmenu:${project.modmenu_version}")

    modImplementation("me.shedaniel.cloth:cloth-config-fabric:${project.clothconfig_version}") {
        exclude(group: "net.fabricmc.fabric-api")
    }
}

loom {
    def aw = project(':common').file("src/main/resources/${mod_id}.accesswidener")
    if (aw.exists()) {
        accessWidenerPath.set(aw)
    }
    mixin {
        defaultRefmapName.set("${mod_id}.refmap.json")
    }
    runs {
        client {
            client()
            setConfigName('Fabric Client')
            ideConfigGenerated(true)
            runDir('runs/client')
        }
        server {
            server()
            setConfigName('Fabric Server')
            ideConfigGenerated(true)
            runDir('runs/server')
        }
    }
}

publishMods {
    file = remapJar.archiveFile
    changelog = rootProject.ext.getChangelog()
    type = STABLE
    modLoaders.add("fabric")

    curseforge {
        projectId = providers.environmentVariable("CURSEFORGE_ID").orElse(rootProject.curseforge_id)
        accessToken = providers.environmentVariable("CURSEFORGE_TOKEN")
                .orElse(providers.gradleProperty("curseforge_token").orElse("DUMMY_TOKEN_FOR_BUILD"))
        minecraftVersions.add("1.21.1")

        requires("fabric-api")
        requires("sable")
        requires("cloth-config")
    }

    modrinth {
        projectId = providers.environmentVariable("MODRINTH_ID").orElse(rootProject.modrinth_id)
        accessToken = providers.environmentVariable("MODRINTH_TOKEN")
                .orElse(providers.gradleProperty("modrinth_token").orElse("DUMMY_TOKEN_FOR_BUILD"))
        minecraftVersions.add("1.21.1")

        requires("fabric-api")
        requires("sable")
        requires("cloth-config")
    }
}